    <!-- Inline script: set canonical + html[lang] from URL path before React mounts.
         Runs synchronously so Google sees the correct values even with JS rendering. -->
    <script>
      (function () {
        var LANGS = ['pt', 'es', 'ja', 'de', 'zh', 'tr', 'fr'];
        var BASE = 'https://sudoku-of-the-day.com';
        var match = window.location.pathname.match(/^\/([a-z]{2})(\/|$)/);
        var lang = match && LANGS.indexOf(match[1]) !== -1 ? match[1] : 'en';
        var canonical = BASE + (lang === 'en' ? '' : '/' + lang) + '/';
        document.documentElement.lang = lang;
        document.querySelector('link[rel="canonical"]').href = canonical;
        document.querySelector('meta[property="og:url"]').setAttribute('content', canonical);
      })();
    </script>
    <script>
      // Restore URL after GitHub Pages 404 redirect
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          window.history.replaceState(null, '', redirect);
        }
      })();
    </script>
    <!-- Google AdSense (site verification + H5 Games Ads / rewarded ads) -->

      crossorigin="anonymous"></script>
    <script>

      window.adBreak = window.adConfig = function (o) { adsbygoogle.push(o); };
      adConfig({ preloadAdBreaks: 'on', sound: 'on' });
