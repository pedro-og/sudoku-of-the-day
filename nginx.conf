server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Gzip compression
  gzip on;
  gzip_min_length 1000;
  gzip_types text/plain text/css text/javascript application/javascript application/json;

  # SPA routing - route all non-file requests to index.html
  location / {
    try_files $uri $uri/ /index.html;
    # Browsers revalidate every time; Cloudflare edge caches for 5 min
    add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate" always;
  }

  # Static assets (JS/CSS have content hashes in filenames — safe to cache forever)
  location ~* \.(js|css|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Images and icons
  location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # index.html — browser never caches; Cloudflare edge caches for 5 min
  location = /index.html {
    add_header Cache-Control "public, max-age=0, s-maxage=300, must-revalidate" always;
  }

  # SEO files — cache lightly at edge
  location ~* \.(xml|txt)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, s-maxage=3600";
  }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self' https://*.supabase.co;" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
}
